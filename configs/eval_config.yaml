# Evaluation and Ablation Configuration
# Paper reference: El Majjaoui et al. (2026), Section 2.5, Tables 4-5

benchmark:
  dev_path: "data/benchmark/dev_set.csv"
  test_path: "data/benchmark/test_set.csv"
  label_column: "gold_label"    # Values: match | non-match | uncertain
  gold_uncertain_exclusion: true  # Primary binary metrics exclude gold-uncertain from denominator

metrics:
  primary:
    - precision    # TP / (TP + FP), gold-uncertain excluded
    - recall       # TP / (TP + FN), gold-uncertain excluded
    - f1           # Harmonic mean of precision and recall
    - coverage     # Proportion of pairs receiving a binary decision
    - uncertain_rate  # 1 - coverage
  secondary:
    - three_way_accuracy  # Correct / total (all three labels included)
  downstream:
    - vocabulary_reduction
    - modularity_q
    - ari          # Adjusted Rand Index
    - ami          # Adjusted Mutual Information

thresholds_tuned:
  source: "results/tuned_thresholds.json"
  note: "All thresholds tuned on dev set only; test set accessed once for final reporting."

output:
  results_dir: "results/paper_v1/"
  figures_dir: "outputs/figures/"
