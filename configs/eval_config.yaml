# Evaluation and Ablation Configuration

benchmark:
  dev_path: "benchmark/gold_standard/dev/"
  test_path: "benchmark/gold_standard/test/"
  label_column: "label"         # Values: match | non-match | uncertain

metrics:
  pairwise: ["precision", "recall", "f1", "coverage", "uncertain_rate"]
  downstream: ["vocabulary_reduction", "modularity", "nmi", "ari"]
  average: "macro"              # Options: macro | micro

ablation:
  enabled: true
  grid:
    guard_confidence_threshold: [0.70, 0.75, 0.80, 0.85, 0.90]
    candidate_gen_top_k: [20, 50, 100]
    embedding_threshold: [0.65, 0.75, 0.85]

output:
  tables_dir: "outputs/tables/"
  figures_dir: "outputs/figures/"
